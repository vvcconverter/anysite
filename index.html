<!DOCTYPE html>
<html>
<head>
  <!-- Подключаем ТВОЙ API с ТВОЕГО Cloudflare Pages -->
  <script src="https://vvec-player.pages.dev/api.js"></script>
</head>
<body>
  <div id="player-container" style="width: 800px; height: 450px; background: #000;"></div>
  
  <script>
    // Убедимся, что API загрузился
    if (window.VVCPlayer) {
      // Создаём плеер. Видео может быть с любого домена, поддерживающего CORS
      const player = new VVCPlayer('player-container', 'https://example.com/video.vvc');
      
      // Пример управления через кнопки
      document.getElementById('playBtn').onclick = () => player.play();
      document.getElementById('pauseBtn').onclick = () => player.pause();
    } else {
      console.error('VVC Player API not loaded. Check script source.');
    }
  </script>
  
  <button id="playBtn">Play</button>
  <button id="pauseBtn">Pause</button>
</body>
</html>
