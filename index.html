<!DOCTYPE html>
<html>
<head>
  <script src="https://vvec-player.pages.dev/api.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #222;
      color: white;
      font-family: Arial, sans-serif;
    }
    #player-container {
      width: 800px;
      height: 450px;
      margin: 0 auto;
      border: 2px solid #444;
      border-radius: 8px;
      overflow: hidden;
    }
    .controls {
      text-align: center;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 16px;
      cursor: pointer;
      background: #444;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
    }
    button:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <h2>VVC Player Demo</h2>
  
  <div id="player-container"></div>
  
  <div class="controls">
    <button onclick="player.play()">Play</button>
    <button onclick="player.pause()">Pause</button>
    <button onclick="player.stop()">Stop</button>
    <button onclick="player.setSource('https://vvec-player.pages.dev/street.mp4')">Load Video</button>
  </div>
  
  <script>
    let player;
    
    window.addEventListener('load', function() {
      player = new VVCPlayer(
        'player-container',
        'https://vvec-player.pages.dev/street.mp4'
      );
    });
  </script>
</body>
</html>
